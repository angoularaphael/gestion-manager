<!--
  WordPress — page Offre d'été (slug offre-d-ete)
  Coller UNIQUEMENT ce bloc (éditeur HTML / code personnalisé).
  Important : src sur l'iframe + script INLINE (WordPress bloque souvent les <script src="...">).
-->
<style>
  header.site-header,
  #masthead,
  .site-header,
  .elementor-location-header,
  .elementor-sticky--active.elementor-location-header,
  nav.main-navigation,
  .main-header,
  #site-navigation,
  .header-wrapper,
  .top-bar,
  footer.site-footer,
  #colophon,
  .site-footer,
  .elementor-location-footer,
  .footer-widgets,
  #footer {
    display: none !important;
  }
  body.admin-bar { margin-top: 0 !important; }
  html { margin-top: 0 !important; }

  .offre-ete-wp { margin: 0; padding: 0; background: #000; }
  .offre-ete-wp__frame-wrap {
    width: 100vw;
    max-width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    overflow: hidden;
    line-height: 0;
    background: #000;
  }
  .offre-ete-wp__frame {
    display: block;
    width: 100%;
    border: 0;
    height: min(100svh, 1200px);
    min-height: 640px;
    overflow: hidden;
    background: #000;
    transition: height 0.25s ease-out;
  }
  body,
  .site-content,
  .entry-content,
  .content-area,
  #content,
  .page-content,
  article.page {
    background: #000 !important;
    padding-bottom: 0 !important;
    margin-bottom: 0 !important;
  }
</style>

<div class="offre-ete-wp">
  <div class="offre-ete-wp__frame-wrap">
    <iframe
      id="offre-ete-frame"
      class="offre-ete-wp__frame"
      src="https://gestion-manager.vercel.app/offre-d-ete/index.html?embed=1&amp;v=20260620-v5"
      title="Offre Été 2026 — 3 mois illimités Boxing Center Toulouse"
      loading="eager"
      scrolling="no"
      allow="fullscreen"
    ></iframe>
  </div>
</div>

<script>
(function () {
  var frame = document.getElementById('offre-ete-frame');
  if (!frame) return;

  var CHILD = 'https://gestion-manager.vercel.app';
  var PAGE_VERSION = '20260620-v5';
  var PAGE = CHILD + '/offre-d-ete/index.html?embed=1&v=' + PAGE_VERSION;
  var MIN_H = 640;
  var MAX_H = 24000;
  var FALLBACK_H = 1200;
  var DELTA = 4;
  var MSG_RESIZE = 'offre-ete-resize';
  var MSG_SCROLL = 'offre-ete-scroll-top';

  if (!frame.getAttribute('src')) frame.src = PAGE;

  var allowed = {};
  [
    CHILD,
    'https://boxingcenter.fr',
    'https://www.boxingcenter.fr',
    'http://boxingcenter.fr',
    'http://www.boxingcenter.fr'
  ].forEach(function (o) { allowed[o] = true; });

  var lastH = 0;

  function setHeight(h) {
    var height = Math.max(MIN_H, Math.min(MAX_H, Number(h) || 0));
    if (Math.abs(height - lastH) < DELTA) return;
    lastH = height;
    frame.style.height = height + 'px';
  }

  window.addEventListener('message', function (e) {
    if (!allowed[e.origin]) return;
    if (!e.data || !e.data.type) return;
    if (e.data.type === MSG_SCROLL) {
      frame.scrollIntoView({ block: 'start', behavior: 'instant' });
      window.scrollTo(0, 0);
      return;
    }
    if (e.data.type === MSG_RESIZE) setHeight(e.data.height);
  });

  frame.addEventListener('load', function () {
    window.setTimeout(function () {
      if (lastH < MIN_H + 60) setHeight(FALLBACK_H);
    }, 2000);
  });
})();
</script>
