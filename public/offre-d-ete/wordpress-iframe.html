<style>
  /* Masquer menu / header WordPress sur cette page */
  header.site-header,
  #masthead,
  .site-header,
  .elementor-location-header,
  .elementor-sticky--active.elementor-location-header,
  nav.main-navigation,
  .main-header,
  #site-navigation,
  .header-wrapper,
  .top-bar {
    display: none !important;
  }
  body.admin-bar { margin-top: 0 !important; }
  html { margin-top: 0 !important; }

  .offre-ete-wp { margin: 0; padding: 0; background: #000; }
  .offre-ete-wp__frame-wrap {
    width: 100vw;
    max-width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    overflow: hidden;
    line-height: 0;
    background: #000;
  }
  .offre-ete-wp__frame {
    display: block;
    width: 100%;
    border: 0;
    height: 100vh;
    height: 100dvh;
    min-height: 600px;
    overflow: hidden;
    background: #000;
  }
  body,
  .site-content,
  .entry-content,
  .content-area,
  #content {
    background: #000 !important;
  }
</style>

<div class="offre-ete-wp">
  <div class="offre-ete-wp__frame-wrap">
    <iframe
      id="offre-ete-frame"
      class="offre-ete-wp__frame"
      src="https://gestion-manager.vercel.app/offre-d-ete/index.html"
      title="Offre Été 2026 — 3 mois illimités Boxing Center"
      loading="lazy"
      scrolling="no"
    ></iframe>
  </div>
</div>

<script>
(function () {
  var frame = document.getElementById('offre-ete-frame');
  if (!frame) return;
  var lastH = 0;
  var ALLOWED = 'https://gestion-manager.vercel.app';

  window.addEventListener('message', function (e) {
    if (e.origin !== ALLOWED) return;
    if (!e.data || e.data.type !== 'offre-ete-resize') return;
    var h = Math.max(600, Math.min(15000, Number(e.data.height) || 0));
    if (Math.abs(h - lastH) < 4) return;
    lastH = h;
    frame.style.height = h + 'px';
  });
})();
</script>
