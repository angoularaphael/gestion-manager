<style>
  .offre-ete-wp { margin: 0; padding: 0; }
  .offre-ete-wp__seo {
    max-width: 800px;
    margin: 0 auto 1.25rem;
    padding: 0 1rem;
    font-family: system-ui, sans-serif;
    line-height: 1.55;
    color: #1a1a1a;
  }
  .offre-ete-wp__seo h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .offre-ete-wp__frame-wrap {
    width: 100vw;
    max-width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    overflow: hidden;
    line-height: 0;
  }
  .offre-ete-wp__frame {
    display: block;
    width: 100%;
    border: 0;
    height: 900px;
    overflow: hidden;
  }
</style>

<div class="offre-ete-wp">
  <div class="offre-ete-wp__seo">
    <h1>Offre Été 2026 — Boxing Center Toulouse</h1>
    <p>
      <strong>3 mois d'accès illimité à 89€</strong> au lieu de 150€. Boxe anglaise, boxe thaï,
      MMA, kickboxing et cross training dans nos 5 salles à Toulouse et en agglomération.
      Coaches diplômés, cours tous niveaux, accès libre 6 jours sur 7.
    </p>
  </div>
  <div class="offre-ete-wp__frame-wrap">
    <iframe
      id="offre-ete-frame"
      class="offre-ete-wp__frame"
      src="https://gestion-manager.vercel.app/offre-d-ete/index.html"
      title="Offre Été 2026 — 3 mois illimités Boxing Center"
      loading="lazy"
      scrolling="no"
    ></iframe>
  </div>
</div>

<script>
(function () {
  var frame = document.getElementById('offre-ete-frame');
  if (!frame) return;
  var lastH = 0;
  var ALLOWED = 'https://gestion-manager.vercel.app';

  window.addEventListener('message', function (e) {
    if (e.origin !== ALLOWED) return;
    if (!e.data || e.data.type !== 'offre-ete-resize') return;
    var h = Math.max(600, Math.min(15000, Number(e.data.height) || 0));
    if (Math.abs(h - lastH) < 4) return;
    lastH = h;
    frame.style.height = h + 'px';
  });
})();
</script>
